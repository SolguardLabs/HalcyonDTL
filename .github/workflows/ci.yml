name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - run: npm install
      - run: bash scripts/ci.sh

